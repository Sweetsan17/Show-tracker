<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/CSS/style.css" />
  </head>
  <body>
    <!-- navigation -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary p-0">
      <div class="container-fluid p-0">
        <a
          class="navbar-brand text-bg-warning text-center"
          mx-auto
          p-2
          style="width: 120px"
          href="#"
          >Show<strong>Trackr</strong></a
        >
        <ul class="navbar-nav">
          <li class="nav-item">
            <a
              class="nav-link text-muted px-3"
              href="intex.html"
              target="_parent"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link text-muted px-3"
              aria-current="page"
              href="add.html"
              target="_parent"
              >Add</a
            >
          </li>
        </ul>
        <div
          class="collapse navbar-collapse d-flex flex-row-reverse"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a
                class="nav-link active text-muted border-dotted px-3"
                aria-current="page"
                href="login.html"
                >Login</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link text-muted px-3"
                href="signup.html"
                target="_parent"
                >Signup</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- login form -->
    <section class="login-container">
      <div class="login-card">
        <h1>Log in</h1>
        <form id="form">
          <div class="input-group">
            <span class="icon"> @ </span>
            <input
              type="email"
              name="email"
              id="email-address"
              placeholder="Email"
              required
            />
            <div class="error"></div>
          </div>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              required
            />
            <div class="error"></div>
          </div>
          <button type="submit" class="btn-login">Login</button>
        </form>
        <div class="links">
          <a href="#">Forgot your password?</a>
          <p>
            Don't have an account yet?
            <a href="signup.html" target="_blank" class="signup">Sign up</a>
          </p>
        </div>
        <div class="divider">
          <span>or</span>
        </div>
        <div class="social-login">
          <button class="btn-social facebook">
            <em>f</em> Sign in with Facebook
          </button>
          <button class="btn-social google">
            <em>g+</em> Sign in with Google
          </button>
        </div>
      </div>
    </section>
    <script src="/JS/login.js"></script>
  </body>
</html>
