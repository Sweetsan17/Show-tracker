<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary p-0">
      <div class="container-fluid p-0">
        <a
          class="navbar-brand text-bg-warning text-center"
          mx-auto
          p-2
          style="width: 120px"
          href="#"
          >Show<strong>Trackr</strong></a
        >
        <ul class="navbar-nav">
          <li class="nav-item">
            <a
              class="nav-link text-muted px-3"
              href="intex.html"
              target="_parent"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link text-muted px-3" href="add.html" target="_parent"
              >Add</a
            >
          </li>
        </ul>
        <div
          class="collapse navbar-collapse d-flex flex-row-reverse"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a
                class="nav-link text-muted px-3"
                href="login.html"
                target="_parent"
                >Login</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link active text-muted border-dotted px-3"
                aria-current="page"
                href="signup.html"
                target="_parent"
                >Signup</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <section class="signup-container">
      <div class="signup-card">
        <h1>Sign up</h1>
        <form>
          <div class="input-group">
            <span class="icon">👤</span>
            <input
              type="text"
              placeholder="Name"
              class="name-input"
              id="name"
              required
            />
            <div class="error"></div>
          </div>
          <div class="input-group">
            <span class="icon"> @ </span>
            <input
              type="email"
              name="email"
              id="email-address"
              placeholder="Email"
              required
            />
            <div class="error"></div>
          </div>
          <div class="input-group">
            <span class="icon">🔒</span>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              required
            />
            <div class="error"></div>
          </div>
          <div class="terms">
            <p>
              By clicking signup you agree to
              <strong>Terms & Conditions</strong> and
              <strong>Privacy Policy</strong>
            </p>
          </div>
          <button type="submit" class="btn-signup">Signup</button>
          <div class="links">
            <p>
              Already have an account?
              <a href="login.html" target="_blank" class="login"
                ><strong>log in now</strong></a
              >
            </p>
          </div>
        </form>
      </div>
    </section>
    <script src="/js/signup.js"></script>
  </body>
</html>
